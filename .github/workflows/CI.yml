name: CI Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["feature/*"]  # Opcional: corre en pushes a tu rama feature para depurar fácilmente

jobs:
  lint:
    name: Lint with Flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Flake8
        run: flake8 src

  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint  # Solo corre si lint pasa
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install project as editable package
        run: pip install -e .  # ← Esto resuelve el import de 'src' en CI (clave para layout src/)

      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q

  security:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    needs: tests  # Solo corre si tests pasa
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
