name: CI Pipeline

on:
  pull_request:
    branches: ["main"]
  push:  # Opcional: para que también corra en pushes directos a la rama feature (útil para depurar)
    branches: ["feature/*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Actualizado a v4 (más reciente y recomendado)

      - name: Set up Python
        uses: actions/setup-python@v5  # Actualizado a v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Flake8
        run: flake8 src

  tests:
    runs-on: ubuntu-latest
    needs: lint  # Solo corre si lint pasa
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt  # Corregido: "Install" → "install" (case-sensitive)

      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q  # Buena opción para fallar rápido

  security:
    runs-on: ubuntu-latest
    needs: tests  # Solo corre si tests pasa
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
